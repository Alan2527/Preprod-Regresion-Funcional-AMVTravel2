name: AMV Travel Preprod Suite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar suite de regresión
        id: tests
        env:
          AMV_ENV: preprod
          AMV_USER: ${{ secrets.AMV_USER }}
          AMV_PASS: ${{ secrets.AMV_PASS }}
          AMV_AGENCIA_USER: ${{ secrets.AMV_AGENCIA_USER }}
          BO_PASS: ${{ secrets.BO_PASS }}
          BO_USER: ${{ secrets.BO_USER }}
        run: pytest --alluredir=allure-results

      - name: Guardar resultados crudos como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 14

      - name: Configurar Java (requerido por Allure)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.32.0
          curl -sSL -o allure.tgz "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          sudo tar -zxf allure.tgz -C /opt/
          sudo ln -sf "/opt/allure-${ALLURE_VERSION}/bin/allure" /usr/local/bin/allure
          allure --version

      - name: Recuperar histórico de la corrida anterior
        if: always()
        run: |
          git fetch origin gh-pages --depth=1 || true
          if git cat-file -e origin/gh-pages:history/history.json 2>/dev/null; then
            mkdir -p allure-results/history
            for f in history.json history-trend.json duration-trend.json retry-trend.json categories-trend.json; do
              git show "origin/gh-pages:history/$f" > "allure-results/history/$f" 2>/dev/null || true
            done
            echo "Histórico recuperado."
          else
            echo "Sin histórico previo (primera corrida)."
          fi

      - name: Generar Reporte Allure
        if: always()
        run: allure generate allure-results --clean -o allure-report --report-name "AMV Travel — Regresión Preprod"

      - name: Personalizar branding (logo, favicon, título)
        if: always()
        run: bash scripts/aplicar_branding.sh allure-report

      - name: Desplegar reporte a GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
